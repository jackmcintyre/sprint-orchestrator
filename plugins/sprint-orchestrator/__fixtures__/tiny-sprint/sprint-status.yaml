sprint_id: tiny-sprint-e2e
stories:
  - id: "A"
    title: Happy path story
    status: ready
    depends_on: []
    acceptance_criteria:
      checks:
        - type: file_exists
          path: src/hello.txt
    orchestrator: {}
    notes: |
      The dev subagent simulator only needs to leave src/hello.txt in
      place (it ships in the fixture). AC always passes; happy path.
  - id: "B"
    title: Backlog story that should auto-promote when A is done
    status: backlog
    depends_on:
      - "A"
    acceptance_criteria:
      checks:
        - type: file_exists
          path: src/world.txt
    orchestrator: {}
    notes: |
      Authored as backlog with one dep on A. After A completes,
      getReadyStories should promote this to ready without any
      manual flip. The e2e harness asserts this auto-promotion.
  - id: "C"
    title: Designed-to-fail story
    status: ready
    depends_on: []
    acceptance_criteria:
      checks:
        - type: file_exists
          path: this/path/does/not/exist.txt
    orchestrator: {}
    notes: |
      AC is designed to never pass. The harness drives this story
      to markStoryFailed and asserts the resulting status is "failed"
      (not "blocked").
