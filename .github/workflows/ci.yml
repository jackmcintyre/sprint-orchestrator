name: CI

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: plugins/sprint-orchestrator

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: plugins/sprint-orchestrator/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      # Build first: packages/hooks imports from packages/mcp-server/dist/.
      - run: pnpm verify
