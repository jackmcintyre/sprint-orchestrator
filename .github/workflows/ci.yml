name: CI

on:
  push:
    branches: [main]
    paths:
      - "plugins/crew/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "plugins/crew/**"
      - ".github/workflows/ci.yml"

defaults:
  run:
    working-directory: plugins/crew

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: plugins/crew/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
