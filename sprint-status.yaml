sprint_id: orchestrator-hardening-followup
stories:
  - id: "1"
    title: Fix the 5 happy-path e2e regressions surfaced by hardening sprint's ship gate
    status: in_progress
    depends_on: []
    acceptance_criteria:
      checks:
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator e2e
          expect_exit: 0
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator verify
          expect_exit: 0
    orchestrator:
      claimed_by: dev-retry2-1747258500
      claimed_at: 2026-05-14T07:19:21.914Z
      rework_count: 0
      branch: 1-fix-the-5-happy-path-e2e-regressions-sur
      branch_prepared_by: dev-retry2-1747258500
      branch_prepared_at: 2026-05-14T07:19:26.727Z
      base_branch: main
    notes: >
      Five happy-path e2e assertions broke when the orchestrator-hardening guards landed (PRs
      #29–#33). The failures were correctly caught by hardening's ship gate (story 6, failed by
      design per planning-discipline Rule 3). This story retires that failure.


      Named failing assertions (from Jack's 2026-05-14 retro):

        1. "two commits per happy-path story" — auto-promotion + commit flow not producing 2
           commits
        2. "completed_at and status=done after happy path" — story ends in_progress, not done
           (two variants of this assertion)
        3. "auto-promotion: backlog story with done dep returned by getReadyStories" — dependency
           promotion not firing
        4. "auto-promoted story B finishes with status=done" — story B stays in backlog
        5. "branch-per-story: dependent story's branch is rooted at dep tip" — hardening Story 3's
           dependency-rooted-base fix not wiring through to full happy-path scenario


      LIKELY ROOT CAUSES (dev should audit before fixing):

        - The e2e happy-path harness does not call markDevReturned between dev work and reviewer
          eval. Hardening Story 1's guard (recordStoryFailure / validateAcceptanceCriteria refuses
          without dev_returned_at) then refuses the eval, causing the cascade.

        - The push-gate from hardening Story 4 fires before the e2e fixture pushes the branch.

        - The auto-promotion path may not trigger markDevReturned either, leaving promoted stories'
          guards un-set.


      CONCRETE ACTIONS:

        - Audit plugins/sprint-orchestrator/scripts/e2e.ts and any shared fixtures. Identify where
          dev work completes vs where reviewer eval starts.

        - Insert markDevReturned (or equivalent — depends on what hardening Story 1 actually
          landed) at the right hand-off point in the fixtures.

        - For push-gate failures: either bypass via pr_per_story: false in fixtures that aren't
          testing PR behaviour, OR add a real push step where the test IS exercising PR flow.

        - Re-run pnpm e2e. Confirm all 5 named assertions pass. Spot-check the rest of the suite
          for any collateral regressions.


      Full developer context in
      _bmad-output/planning-artifacts/brief-orchestrator-hardening-followup.md.
  - id: "2"
    title: Dev spawn prompt hardening — mandatory tool calls and decide-and-ship directives
    status: ready
    depends_on: []
    acceptance_criteria:
      checks:
        - type: shell
          cmd: test -f
            plugins/sprint-orchestrator/packages/mcp-server/src/tools/dev-agent-behavioural-directives.ts
          expect_exit: 0
        - type: shell
          cmd: grep -q MANDATORY_TOOL_CALL_DIRECTIVE
            plugins/sprint-orchestrator/packages/mcp-server/src/tools/dev-agent-behavioural-directives.ts
          expect_exit: 0
        - type: shell
          cmd: grep -q DECIDE_AND_SHIP_DIRECTIVE
            plugins/sprint-orchestrator/packages/mcp-server/src/tools/dev-agent-behavioural-directives.ts
          expect_exit: 0
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator e2e --grep "agents/dev.md contains mandatory tool-call
            and decide-and-ship directives verbatim"
          expect_exit: 0
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator verify
          expect_exit: 0
    orchestrator:
      rework_count: 0
    notes: >
      During hardening, the dev subagent stalled mid-research on 3 of 5 stories. Each needed 2–3
      spawns because the dev would reach a decision point and return early instead of finishing. Two
      patterns observed:


        1. Required tool calls buried in story notes were skipped — markDevReturned was described
           in notes but not surfaced as an explicit task. Devs didn't call it.

        2. Devs reached decision points and returned early — when a story required choosing between
           two viable implementation approaches, the dev returned with a question instead of
           picking one and shipping.


      Same pattern as the deferred no-clarifying-questions follow-up. Fix in agents/dev.md system
      prompt with explicit behavioural contracts.


      CONCRETE ACTIONS:

        - New phrase-lock module
          plugins/sprint-orchestrator/packages/mcp-server/src/tools/dev-agent-behavioural-directives.ts
          exporting two string constants:

            MANDATORY_TOOL_CALL_DIRECTIVE:
              "If the story names a specific MCP tool you must call (e.g. `markDevReturned`),
              call it as part of completing the story. Do not return without calling it."

            DECIDE_AND_SHIP_DIRECTIVE:
              "When a story has a decision point with multiple viable approaches, pick one and
              ship. Do not return to ask the PM unless the spec is genuinely ambiguous (missing
              field names, contradictory ACs, no way to satisfy the AC). 'Could this be done
              better?' is not ambiguity — it's a design judgment the dev owns."

        - Add both directives to agents/dev.md, near the top of the system prompt section, as
          a labelled block: "Behavioural directives (do not skip)."

        - New e2e mini-run with grep tag
          "agents/dev.md contains mandatory tool-call and decide-and-ship directives verbatim"
          — loads both constants, loads agents/dev.md as a string, asserts both appear verbatim.
          Phrase-lock pattern, identical shape to existing RESOLVE_SPAWN_MODEL_INSTRUCTION check.


      MANUAL SUCCESS TARGET (recorded by reviewer, validated over time):
        Over the next 2 sprints, no story should require >1 dev spawn purely due to mid-research
        stalls or skipped mandatory tool calls. This is a directional metric, not an AC.


      Full developer context in
      _bmad-output/planning-artifacts/brief-orchestrator-hardening-followup.md.


      Note: this story also touches the deferred dev-spawn-no-questions follow-up
      (`feedback-dev-spawn-no-questions` in memory). If the dev finds it cheap to add a third "no
      clarifying questions" directive in the same module, they should — surface in the
      implementation summary so the reviewer can decide whether to expand scope or defer.
  - id: "3"
    title: run-sprint refuses to launch with uncommitted sprint-status.yaml
    status: ready
    depends_on: []
    acceptance_criteria:
      checks:
        - type: shell
          cmd: grep -qE "git status|uncommitted|dirty" plugins/sprint-orchestrator/skills/run-sprint/SKILL.md
          expect_exit: 0
        - type: shell
          cmd: grep -q UNCOMMITTED_BACKLOG_REFUSAL plugins/sprint-orchestrator/packages/mcp-server/src/tools
          expect_exit: 0
        - type: shell
          cmd: grep -q "Commit sprint-status.yaml" _bmad-output/planning-artifacts/planning-discipline.md
          expect_exit: 0
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator e2e --grep "run-sprint refuses when sprint-status.yaml
            has uncommitted changes"
          expect_exit: 0
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator verify
          expect_exit: 0
    orchestrator:
      rework_count: 0
    notes: >
      During the hardening sprint launch, sprint-status.yaml was never committed. When PR #29 merged
      to main, the merge overwrote the live backlog file. Manual recovery from a dangling git blob
      was scrappy and one-off; an external user hitting this would lose their backlog with no
      recovery path.


      CONCRETE ACTIONS:

        - Edit plugins/sprint-orchestrator/skills/run-sprint/SKILL.md. Add a pre-flight step
          (step 0 or step 1, before any other action): run `git status --porcelain` against the
          configured sprintStatusPath. If non-empty, refuse with a clear message.

        - Phrase-lock the refusal message via a new TS constant UNCOMMITTED_BACKLOG_REFUSAL.
          Module home: either a new phrase-lock module
          (plugins/sprint-orchestrator/packages/mcp-server/src/tools/run-sprint-preflight-phrases.ts)
          OR fold into the existing run-sprint-output-format.ts. Decide during implementation;
          lean toward existing module for cohesion.

        - Promote to planning-discipline.md as a new rule. Suggested text:
            "Commit sprint-status.yaml before launching a sprint. Story PRs that merge to main
            mid-run will otherwise overwrite live backlog state, requiring manual recovery."
          This is a planning-discipline rule (2026-05-14 retro lesson) AND a mechanical
          enforcement (skill refusal). Both layers reinforce.

        - New e2e mini-run with grep tag
          "run-sprint refuses when sprint-status.yaml has uncommitted changes" — sets up a temp
          git repo, writes a sprint-status.yaml WITHOUT committing, invokes the skill's
          pre-flight check (or its extracted helper), asserts the refusal fires with the
          phrase-locked message.


      The third AC check above (grep planning-discipline.md) is the planning-discipline rule
      addition. The second AC check (grep packages/mcp-server/src/tools) covers either module home
      option — the constant must exist somewhere under packages/mcp-server/src/tools.


      Full developer context in
      _bmad-output/planning-artifacts/brief-orchestrator-hardening-followup.md.
  - id: "4"
    title: Ship gate — pnpm e2e + pnpm verify green + manual pr_per_story=true smoketest
    status: ready
    depends_on:
      - "1"
      - "2"
      - "3"
    acceptance_criteria:
      checks:
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator e2e
          expect_exit: 0
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator verify
          expect_exit: 0
    orchestrator:
      rework_count: 0
    notes: >
      Verification-only ship gate per planning-discipline Rule 3. Mechanical gates checked above.


      MANUAL gate: Jack runs a small 2-3 story sprint with pr_per_story=true — the same conditions
      that broke the hardening sprint's ship gate — and confirms:


        1. No spurious failures pre-implementation (hardening Story 1 verified live).

        2. Any failure has structured details visible in sprint-status.yaml (hardening Story 2
           verified live).

        3. Story N+1's branch correctly roots off Story N's tip; separate PR per story, no collapse
           (hardening Story 3 verified live).

        4. Reviewer can't mark a story `done` if it forgot to push the branch — state machine
           refuses cleanly (hardening Story 4 verified live).

        5. Dev subagents complete in 1 spawn per story (this sprint's Story 2 verified live).

        6. run-sprint refuses cleanly when sprint-status.yaml is dirty (this sprint's Story 3
           verified live).


      Manual smoketest result (pass/fail + notes per the 6 checks above) is recorded in the reviewer
      summary before recordStorySuccess. If any check fails, route rework to the offending story
      (1-3 from this sprint OR back to hardening if a hardening guard misbehaves), NOT to this ship
      gate.


      ONCE THIS SHIP GATE PASSES:
        - The orchestrator-hardening sprint's failed story 6 is retired (Phase 1 complete per
          roadmap.md).
        - Phase 2 (inter-agent comms plumbing) can begin.
        - Sprint mode is clean enough to be the dog-fooding substrate for building continuous flow.
