sprint_id: runsprint-ergonomics
stories:
  - id: "1"
    title: "run-sprint /goal command is single-line, last-line of output, with fresh-context-window guidance, locked in a constants module"
    status: ready
    depends_on: []
    acceptance_criteria:
      checks:
        - type: shell
          cmd: "pnpm --dir plugins/sprint-orchestrator e2e --grep \"run-sprint emits goal on guaranteed last line with fresh-context guidance\""
          expect_exit: 0
    orchestrator:
      rework_count: 0
    notes: |
      PROBLEM: today /sprint-orchestrator:run-sprint computes the turn cap and prints the canonical /goal command, but the printed line is buried in surrounding narrative — making it fiddly to select and copy. The Claude Code harness does NOT allow a skill to fire a slash command directly (confirmed by spike via claude-code-guide agent on 2026-05-13). So copy-paste is here to stay; the win is making it trivial.

      DECISION: structure run-sprint's output so the /goal command is (a) on a single line (no soft-wrapping), (b) the literal final line of stdout (nothing trailing it), and (c) preceded by a one-line user-facing note advising paste in a fresh context window. All three locked in a constants module so the e2e and the skill cannot drift.

      BEHAVIOUR (locked format — exact strings to be defined as constants in the new module):
        - Second-to-last line of output: "Paste this in a fresh context window for the cleanest run:" (or equivalent — final wording is the dev's call as long as the constants module and the e2e assertion agree).
        - Last line of output: the canonical "/goal /sprint-orchestrator:process-backlog UNTIL every story in sprint-status.yaml is status=done or status=failed, OR stop after <N> turns" — single line, no wrap.
        - Absolutely nothing printed AFTER the /goal line. No summary, no trailing whitespace beyond a single \n.
        - The two locked lines should be separated from any preceding narrative by a blank line so they visually stand out.

      WHY FRESH-CONTEXT-WINDOW MATTERS:
        - Normalises copy-paste as a deliberate, beneficial action (not a chore).
        - A fresh context window gives /goal a clean transcript to evaluate the drain condition against — no prior conversation noise.

      FILES TO TOUCH:
        - plugins/sprint-orchestrator/packages/mcp-server/src/tools/run-sprint-output-format.ts (NEW)
            * Mirrors the format-end-of-run-line.ts and readme-adopt-phrases.ts patterns from prior sprints.
            * Exports: FRESH_CONTEXT_GUIDANCE_LINE (constant string), formatGoalCommandLine(turnCap: number) (function), buildRunSprintFinalOutput(turnCap: number) (assembles the last-two-lines block).
        - plugins/sprint-orchestrator/skills/run-sprint/SKILL.md
            * Restructure output so buildRunSprintFinalOutput() is the literal final block printed.
            * Any prior summary/narrative content moves ABOVE the blank-line separator.
        - plugins/sprint-orchestrator/scripts/e2e.ts
            * New mini-run runRunSprintGoalLastLineMiniRun() behind grep tag "run-sprint emits goal on guaranteed last line with fresh-context guidance".
            * Imports planRunSprint() (existing module from the goal-adoption sprint) and the new buildRunSprintFinalOutput().
            * Asserts: (a) buildRunSprintFinalOutput(N) ends with the canonical /goal line for N, (b) the /goal line contains no embedded newlines, (c) the second-to-last non-empty line is the fresh-context guidance string, (d) nothing follows the /goal line except at most one trailing newline.

      EXISTING SURFACES TO REUSE:
        - planRunSprint() at plugins/sprint-orchestrator/packages/mcp-server/src/tools/plan-run-sprint.ts already computes the turn cap and produces the /goal command string. Wrap or extend; do not duplicate.

      OUT OF SCOPE:
        - OSC 52 clipboard auto-copy is Story 2. Do not implement here.
        - Any README rewording is Story 3. Do not edit README.md here.

  - id: "2"
    title: "Spike + implement OSC 52 clipboard auto-copy for the /goal command (with env-var opt-out)"
    status: ready
    depends_on: ["1"]
    acceptance_criteria:
      checks:
        - type: shell
          cmd: "pnpm --dir plugins/sprint-orchestrator e2e --grep \"run-sprint emits OSC 52 clipboard sequence for goal command with opt-out\""
          expect_exit: 0
    orchestrator:
      rework_count: 0
    notes: |
      PROBLEM: even with Story 1's last-line guarantee, the user still has to select and copy. OSC 52 is a terminal escape that loads a string directly into the system clipboard — supported by iTerm2, Kitty, WezTerm, modern Windows Terminal, Alacritty, and others. If the Claude Code harness passes escape codes through to the user's terminal, we can copy the /goal command into the clipboard automatically — user just pastes.

      RISK: we are not 100% sure Claude Code passes terminal escapes through verbatim. This story starts with a spike. If the spike fails, the implementation is dropped to follow-ups.md and the story closes as "spike-failed — limitation documented" (not "failed").

      TASK 1 — Spike (must complete before any implementation):
        - Construct a minimal test: print an OSC 52 escape sequence (\x1b]52;c;<base64>\x07) from a temporary skill or test harness invocation, with a known unique sentinel string in the clipboard payload.
        - Verify by checking the system clipboard contents after the print (the developer can use pbpaste on macOS, xclip -o on Linux).
        - If sentinel string is in clipboard -> escape passes through; PROCEED to Task 2.
        - If not -> escape is stripped or filtered; HALT implementation.

      TASK 2 — Implementation (only if spike succeeds):
        - Extend plugins/sprint-orchestrator/packages/mcp-server/src/tools/run-sprint-output-format.ts with:
            * buildClipboardEscape(payload: string): string — returns the OSC 52 sequence wrapping a base64-encoded payload. Pure function.
            * Modify buildRunSprintFinalOutput() to emit the OSC 52 escape immediately before the /goal line, UNLESS the env var SPRINT_ORCHESTRATOR_NO_CLIPBOARD is set to "1" or "true".
        - Add a one-line user-facing note above the fresh-context-guidance line: "(your /goal command is also copied to your clipboard — paste with Cmd+V / Ctrl+V)". Lock this string in the constants module. Only emit it when clipboard escape is being emitted (i.e. opt-out is not set).

      TASK 3 — e2e (always required):
        - Extend scripts/e2e.ts with runRunSprintOsc52ClipboardMiniRun() behind grep tag "run-sprint emits OSC 52 clipboard sequence for goal command with opt-out".
        - Assertions:
            (a) buildRunSprintFinalOutput(N) WITHOUT the env var set: output contains a substring matching the OSC 52 pattern (\x1b]52;c;[A-Za-z0-9+/=]+\x07), the base64 payload decodes to the canonical /goal command, and the user-facing clipboard note is present.
            (b) buildRunSprintFinalOutput(N) WITH SPRINT_ORCHESTRATOR_NO_CLIPBOARD=1 set: NO OSC 52 substring present, NO clipboard note in output, /goal line still present as last line.
            (c) If the spike failed and implementation was dropped: the test stub emits a structured skip with a clear reason; the assertion is recorded as PASS with a note that ties to follow-ups.md.

      FAILURE PATH (spike fails):
        - Document the result in _bmad-output/planning-artifacts/follow-ups.md under a new entry "OSC 52 clipboard auto-copy blocked by harness escape filtering" with: what was tested, what was observed, recommended next step (e.g. revisit when Claude Code adds a clipboard primitive).
        - The e2e mini-run still runs, but its assertions check only that the env-var opt-out is wired (no-op safety) and that no OSC 52 sequence leaks into output.

      OUT OF SCOPE:
        - Cross-terminal compatibility testing beyond the spike. We trust OSC 52 to do its thing where supported; the env-var opt-out is the user's escape hatch.
        - README documentation is Story 3.

  - id: "3"
    title: "README documents the new run-sprint output flow (last-line, fresh-context, clipboard auto-copy)"
    status: ready
    depends_on: ["1", "2"]
    acceptance_criteria:
      checks:
        - type: shell
          cmd: "pnpm --dir plugins/sprint-orchestrator e2e --grep \"README documents run-sprint last-line fresh-context and clipboard flow\""
          expect_exit: 0
    orchestrator:
      rework_count: 0
    notes: |
      PROBLEM: Stories 1 and 2 change the on-screen behaviour of run-sprint. The README must explain the new flow so users know to expect the /goal line on the last line, that it's in their clipboard (when supported), and the rationale for pasting in a fresh context window.

      BEHAVIOUR (README.md "Running a sprint" section):
        - Update the run-sprint description to state: the wrapper computes the turn cap (existing content — preserve), prints the canonical /goal command as the final line of output, and on terminals that support OSC 52 also loads it into the user's clipboard.
        - Add a short rationale: "Paste the /goal command in a fresh context window. A clean transcript gives the /goal evaluator the best chance of correctly deciding when the drain condition is met."
        - Document the opt-out: "If your terminal renders OSC 52 sequences as garbage characters, set SPRINT_ORCHESTRATOR_NO_CLIPBOARD=1 to disable the clipboard auto-copy."
        - If Story 2's spike failed and OSC 52 was not implemented: documentation must NOT claim clipboard auto-copy exists. Instead, link to follow-ups.md and note "clipboard auto-copy is tracked as a follow-up."

      LOCK ASSERTION PHRASES:
        - Mirror the readme-adopt-phrases.ts pattern from the prior sprint.
        - New module: plugins/sprint-orchestrator/packages/mcp-server/src/tools/readme-runsprint-phrases.ts.
        - Export: FRESH_CONTEXT_RATIONALE (string), CLIPBOARD_OPT_OUT_INSTRUCTION (string).

      INTEGRATION AC:
        - New e2e mini-run runReadmeDocumentsRunSprintLastLineMiniRun() behind grep tag "README documents run-sprint last-line fresh-context and clipboard flow".
        - Assertions:
            (a) "Running a sprint" section of README contains the FRESH_CONTEXT_RATIONALE constant verbatim.
            (b) The section describes /goal as the final line of output (look for an unambiguous phrase locked in the constants module).
            (c) Conditional on Story 2 outcome:
                * If OSC 52 was implemented (constants module exports buildClipboardEscape): README contains CLIPBOARD_OPT_OUT_INSTRUCTION verbatim.
                * If OSC 52 was dropped to follow-ups: README contains a sentence acknowledging clipboard auto-copy is deferred, with a link or pointer to follow-ups.md.

      FILES TO TOUCH:
        - plugins/sprint-orchestrator/README.md
        - plugins/sprint-orchestrator/packages/mcp-server/src/tools/readme-runsprint-phrases.ts (NEW)
        - plugins/sprint-orchestrator/scripts/e2e.ts

      OUT OF SCOPE:
        - Editing other README sections (adopt, process-backlog) unless those edits are required to keep the "Running a sprint" section coherent.

  - id: "4"
    title: "Ship gate — pnpm e2e + verify green"
    status: ready
    depends_on: ["1", "2", "3"]
    acceptance_criteria:
      checks:
        - type: shell
          cmd: "pnpm --dir plugins/sprint-orchestrator e2e"
          expect_exit: 0
        - type: shell
          cmd: "pnpm --dir plugins/sprint-orchestrator verify"
          expect_exit: 0
    orchestrator:
      rework_count: 0
    notes: |
      Per planning-discipline rule 3. Full unfiltered e2e + verify proves stories 1-3 integrate cleanly and don't regress existing assertions.

      If this fails, the reviewer should rework the offending prior story, not record this one as failed.
