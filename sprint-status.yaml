    notes: >
      Rewrite the README "Running a sprint" section to lead with adopt, name the adaptor pattern,
      and state the one-way coupling rule in prose. Lock the assertion phrases to a single source of
      truth.


      Full BMad story spec:
        _bmad-output/implementation-artifacts/1-3-readme-documents-adopt-as-the-recommended-entrypoint-and-names-the-in-plugin-adaptor-pattern.md

      What to build:
        - Edit plugins/sprint-orchestrator/README.md "Running a sprint" section:
            * Lead with /sprint-orchestrator:adopt <path> as recommended entrypoint for any external planning context.
            * Describe the flow in 2-4 sentences: source -> LLM subagent drafts -> user review (accept/edit/abort) -> on accept, lintSprint validates -> write to sprint-status.yaml.
            * Immediately after, a short paragraph naming the adaptor pattern as the in-plugin extension point for producer-specific fast paths.
            * Cite BMad as one possible example, framed as: "BMad is one example; the pattern works for any producer that can emit a conforming backlog."
            * State the one-way coupling rule in prose: the orchestrator core does not import adaptors; adaptors depend on the schema, never the reverse.
            * Make explicit no adaptors ship in this sprint — pattern documented for future extension.
            * PRESERVE the existing run-sprint + cap formula + end-of-run summary lines content (from the prior sprint). Adopt is prepended, not a replacement.

        - Lock assertion phrases to a constants module (mirror packages/mcp-server/src/tools/format-end-of-run-line.ts pattern). Suggested file: packages/mcp-server/src/tools/readme-adopt-phrases.ts (or similar).

        - Producer-name scan (this story's responsibility to verify, not patch):
            * grep -ri "bmad|linear|notion|jira" plugins/sprint-orchestrator/skills/adopt/ plugins/sprint-orchestrator/packages/mcp-server/src/tools/adopt-write.ts
            * Expect zero hits. If hits exist, this is a Story 1 bug — surface in the reviewer feedback.

        - e2e mini-run: runReadmeDocumentsAdoptAndAdaptorPatternMiniRun() in scripts/e2e.ts.
            * Reads README, extracts "Running a sprint" section.
            * Asserts: (a) "/sprint-orchestrator:adopt" present in that section, (b) "adaptor pattern" phrase present, (c) one-way-coupling statement present (use the constant), (d) grep tag matches "README documents adopt and the in-plugin adaptor pattern".

      Out of scope:
        - Building any adaptor (e.g. bmad-to-orchestrator). README names the pattern only.
        - Authoring a separate schema doc. README may link to lintSprint as the schema source of truth.
