sprint_id: pr-per-story-sprint-1.1
stories:
  - id: "1"
    title: Add pr_per_story and default_base to OrchestratorConfig (passive)
    status: done
    depends_on: []
    acceptance_criteria:
      checks:
        - type: regex
          cmd: cat plugins/sprint-orchestrator/packages/mcp-server/src/tools/get-or-init-config.ts
          pattern: pr_per_story
        - type: regex
          cmd: cat plugins/sprint-orchestrator/packages/mcp-server/src/tools/get-or-init-config.ts
          pattern: default_base
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator verify
          expect_exit: 0
    orchestrator:
      claimed_by: dev-pps11-1
      claimed_at: 2026-05-13T03:44:29.726Z
      completed_at: 2026-05-13T03:47:17.183Z
      summary: Added passive pr_per_story (default true) and default_base (default "main") fields to
        OrchestratorConfig with round-trip support and tests; no behavior change yet.
      artefacts:
        - git:136274526b44ebc6b20b165f6a145b4ed738b229
        - plugins/sprint-orchestrator/packages/mcp-server/src/tools/get-or-init-config.ts
        - plugins/sprint-orchestrator/packages/mcp-server/__tests__/config.test.ts
    notes: |
      Add two optional fields to OrchestratorConfig:
        - pr_per_story?: boolean   // default TRUE (PM call: this becomes
                                   // the default workflow; existing
                                   // shared-branch mode is the opt-out)
        - default_base?: string    // default "main"

      Read both from .sprint-orchestrator/config.yaml; pass through in the
      tool's return value. NO BEHAVIOR CHANGE in this story — the fields are
      consumed in story 2.

      Tests: config without either field defaults pr_per_story=true and
      default_base="main"; explicit `pr_per_story: false` round-trips
      (proves the opt-out works); explicit default_base="develop" round-trips.
  - id: "2"
    title: Branch-per-story when flag is on (local only, no push)
    status: done
    depends_on:
      - "1"
    acceptance_criteria:
      checks:
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator verify
          expect_exit: 0
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator e2e -- --grep "branch-per-story"
          expect_exit: 0
    orchestrator:
      claimed_by: dev-pps11-2
      claimed_at: 2026-05-13T03:47:43.060Z
      completed_at: 2026-05-13T03:55:40.855Z
      summary: Added prepareStoryBranch MCP tool that creates a per-story branch from default_base when
        pr_per_story is enabled (no-op otherwise), wired it into the process-backlog skill, and
        extended the e2e harness with a branch-per-story assertion plus an opt-out mini-run.
      artefacts:
        - git:e60b661d1d5cc815e0d6cf855b132722f88a53b6
        - plugins/sprint-orchestrator/packages/mcp-server/src/tools/prepare-story-branch.ts
        - plugins/sprint-orchestrator/packages/mcp-server/src/index.ts
        - plugins/sprint-orchestrator/skills/process-backlog/SKILL.md
        - plugins/sprint-orchestrator/scripts/e2e.ts
    notes: |
      When pr_per_story is true, the orchestrator creates a per-story branch
      from default_base before the dev subagent starts work. The dev's commits
      then land on that branch. When pr_per_story is false, behavior is
      unchanged (commits go on whatever branch is checked out).

      Recommended implementation: a new MCP tool `prepareStoryBranch(storyId,
      agentId)` called by the process-backlog skill between claimStory and
      spawning the dev subagent. The tool:
        - Reads config; no-ops if pr_per_story is false (returns { branch: null }).
        - If true: computes branch name `<story-id>-<slug-of-title>` (lowercase,
          alphanumerics+hyphens, max 40 chars).
        - Runs `git checkout -b <branch> <default_base>` from ctx.projectRoot.
        - Persists `branch` on story.orchestrator so slice 1.2 (push) can read it.
        - Returns { branch }.

      Skill update: process-backlog calls prepareStoryBranch right after
      claimStory succeeds, before spawning the dev subagent.

      E2E harness: with pr_per_story now defaulting to TRUE, the fixture
      sprint will exercise branch-per-story by default. Add a new assertion
      "branch-per-story: story A's commits land on its own branch when flag
      is on". The existing 7 assertions must continue to pass under the new
      default (most are agnostic to which branch the commits land on; verify
      no assertion has implicit branch-name expectations).

      Add a second mini-run within the same e2e to exercise the
      pr_per_story=false code path: spin up a second temp repo with the
      flag explicitly off, drive one happy story, assert commits land on
      the initial branch (not a feature branch). This guards the opt-out
      path against future regressions.

      Out of scope (slice 1.2): pushing the branch, opening a PR, auto-merge,
      anything that touches origin or gh.
  - id: "3"
    title: Ship gate — pnpm e2e green
    status: in_progress
    depends_on:
      - "1"
      - "2"
    acceptance_criteria:
      checks:
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator e2e
          expect_exit: 0
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator verify
          expect_exit: 0
    orchestrator:
      claimed_by: dev-pps11-3
      claimed_at: 2026-05-13T03:56:05.778Z
    notes: |
      Per the discipline rule documented in process-backlog/SKILL.md, every
      sprint ends with a ship gate story whose AC runs the full e2e suite.
      No production code change here; this story exists to prove the slice
      integrates cleanly end-to-end.
