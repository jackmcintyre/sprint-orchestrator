sprint_id: model-tiering-v1
stories:
  - id: "1"
    title: Per-agent model defaults — frontmatter + config + resolveSpawnModel MCP tool
    status: done
    depends_on: []
    acceptance_criteria:
      checks:
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator e2e --grep "resolveSpawnModel respects frontmatter and
            config override"
          expect_exit: 0
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator verify
          expect_exit: 0
    orchestrator:
      claimed_by: dev-run-1763100000
      claimed_at: 2026-05-13T23:16:24.263Z
      completed_at: 2026-05-13T23:28:28.305Z
      summary: Added per-agent model defaults via dev/reviewer frontmatter, optional config.models block,
        and a new resolveSpawnModel MCP tool with phrase-locked SKILL.md spawn instruction.
      rework_count: 0
      artefacts:
        - git:6640bbe50c92f6a717b2d39cad3e129fffed1a86
        - plugins/sprint-orchestrator/agents/dev.md
        - plugins/sprint-orchestrator/agents/reviewer.md
        - plugins/sprint-orchestrator/packages/mcp-server/src/index.ts
        - plugins/sprint-orchestrator/packages/mcp-server/src/tools/context.ts
        - plugins/sprint-orchestrator/packages/mcp-server/src/tools/get-or-init-config.ts
        - plugins/sprint-orchestrator/packages/mcp-server/src/tools/model-tiering-defaults.ts
        - plugins/sprint-orchestrator/packages/mcp-server/src/tools/process-backlog-spawn-phrases.ts
        - plugins/sprint-orchestrator/packages/mcp-server/src/tools/resolve-spawn-model.ts
        - plugins/sprint-orchestrator/scripts/e2e.ts
        - plugins/sprint-orchestrator/skills/process-backlog/SKILL.md
    notes: >
      PROBLEM: today every dev and reviewer Task spawn inherits the parent session's model. Jack's
      sessions run on Opus 4.7, so every routine implementation and review burns Opus tokens. The
      static portion of brief-model-tiering's v1 fixes this without any escalation logic.


      DECISION: three changes wired together.

        1. Add `model:` frontmatter to plugins/sprint-orchestrator/agents/dev.md and
           agents/reviewer.md with the value `claude-sonnet-4-6`. This is the static default if no
           config override exists.

        2. Extend the config schema (plugins/sprint-orchestrator/packages/mcp-server/src/state/
           config-schema.ts or wherever the .sprint-orchestrator/config.yaml shape is defined)
           with an optional `models:` block:

             models:
               dev: <model-id, optional>
               reviewer: <model-id, optional>

           Config values, when present, override the agent-file frontmatter at spawn time.

        3. New MCP tool resolveSpawnModel({ storyId, role }) → { model: string }. Reads the
           config + the agent file's frontmatter and returns the model ID the orchestrator should
           pass to the Task tool when spawning. NO escalation logic in this story — Story 2 adds
           that branch. Resolution order:
             - config.models[role] if set
             - agent-file frontmatter `model:` field
             - fallback constant exported from a new module:
               packages/mcp-server/src/tools/model-tiering-defaults.ts exporting
               DEFAULT_DEV_MODEL = "claude-sonnet-4-6" and DEFAULT_REVIEWER_MODEL =
               "claude-sonnet-4-6". The fallback exists so the resolver works in tests that
               don't ship agent files.

        4. Update plugins/sprint-orchestrator/skills/process-backlog/SKILL.md step 5 (dev spawn)
           and step 6 (reviewer spawn) to call resolveSpawnModel BEFORE each Task call and pass
           the returned model ID via Task's `model` parameter. Phrase-lock the resolver-call
           instruction via a new module
           packages/mcp-server/src/tools/process-backlog-spawn-phrases.ts exporting
           RESOLVE_SPAWN_MODEL_INSTRUCTION (the exact sentence appears verbatim in SKILL.md).


      MODEL IDS:
        - Sonnet: "claude-sonnet-4-6"
        - Opus: "claude-opus-4-7"
        (Defined as constants in model-tiering-defaults.ts to keep them in one place.)


      RATE-LIMIT FALLBACK: out of v1 scope per the brief's locked decisions. resolveSpawnModel
      returns the desired model ID; the Task tool itself handles availability. If a model is
      unavailable Claude Code's spawn behaviour is whatever it is today — no new fallback logic.


      FILES TO TOUCH:
        - plugins/sprint-orchestrator/agents/dev.md (add `model:` frontmatter)
        - plugins/sprint-orchestrator/agents/reviewer.md (add `model:` frontmatter)
        - plugins/sprint-orchestrator/packages/mcp-server/src/state/config-schema.ts (extend
          schema with optional models block)
        - plugins/sprint-orchestrator/packages/mcp-server/src/tools/model-tiering-defaults.ts (NEW)
        - plugins/sprint-orchestrator/packages/mcp-server/src/tools/resolve-spawn-model.ts (NEW)
        - plugins/sprint-orchestrator/packages/mcp-server/src/tools/process-backlog-spawn-phrases.ts (NEW)
        - plugins/sprint-orchestrator/skills/process-backlog/SKILL.md (call resolveSpawnModel
          before each Task spawn; embed RESOLVE_SPAWN_MODEL_INSTRUCTION verbatim)
        - plugins/sprint-orchestrator/packages/mcp-server/src/server.ts (register the new MCP
          tool)
        - plugins/sprint-orchestrator/scripts/e2e.ts (new mini-run, see AC verification)


      AC VERIFICATION (planning-discipline Rule 1 — real MCP tool, real files):
        New mini-run runResolveSpawnModelStaticMiniRun behind grep tag
        "resolveSpawnModel respects frontmatter and config override". Sets up a temp directory
        with a real .sprint-orchestrator/config.yaml fixture, a real sprint-status.yaml fixture,
        and stub agent files. Invokes the registered resolveSpawnModel MCP tool (NOT the helper,
        NOT a mock) and asserts the resolved model ID. Four fixtures:

          * frontmatter-only/ — agent file says claude-sonnet-4-6, no models block in config.
            Resolver returns "claude-sonnet-4-6" for role=dev.
          * config-override/ — agent file says claude-sonnet-4-6, config says
            models.dev: claude-opus-4-7. Resolver returns "claude-opus-4-7" for role=dev (config
            wins).
          * no-frontmatter-no-config/ — agent file missing the model field, no models block.
            Resolver returns DEFAULT_DEV_MODEL ("claude-sonnet-4-6") for role=dev.
          * reviewer-role/ — agent file says claude-sonnet-4-6 in reviewer.md, config has no
            models.reviewer. Resolver returns "claude-sonnet-4-6" for role=reviewer.

        Plus a phrase-lock assertion: SKILL.md contains RESOLVE_SPAWN_MODEL_INSTRUCTION verbatim.

        Story 1 does NOT exercise the rework-escalation branch. That's Story 2's mini-run.


      OUT OF SCOPE FOR STORY 1:
        - Rework escalation (Story 2).
        - Cost telemetry, model_history schema, per-story tier override, AC-complexity
          heuristic — all deferred to later slices per the brief.
        - Haiku tier for skill calls or fan-out — out of v1.
        - Changing the parent-session model (Jack's own Claude Code session model is unaffected).
  - id: "2"
    title: Rework escalation — dev re-spawn after rework jumps to Opus
    status: done
    depends_on:
      - "1"
    acceptance_criteria:
      checks:
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator e2e --grep "resolveSpawnModel escalates dev on rework
            only"
          expect_exit: 0
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator verify
          expect_exit: 0
    orchestrator:
      claimed_by: dev-run-1763100002
      claimed_at: 2026-05-13T23:28:36.706Z
      rework_count: 0
      completed_at: 2026-05-13T23:32:20.304Z
      summary: resolveSpawnModel now escalates dev re-spawns to Opus when rework_count > 0; reviewer tier
        unchanged. New e2e mini-run verifies all four fixture cases.
      artefacts:
        - git:940359af96f6e059c74aee90dbbd55ea7b50f656
        - plugins/sprint-orchestrator/packages/mcp-server/src/tools/model-tiering-defaults.ts
        - plugins/sprint-orchestrator/packages/mcp-server/src/tools/resolve-spawn-model.ts
        - plugins/sprint-orchestrator/scripts/e2e.ts
    notes: >
      PROBLEM: even with Story 1's static defaults, a story that failed once at Sonnet will retry at
      Sonnet — same model, same failure mode likely. The brief's locked v1 escalation rule is "dev
      attempts after rework run on Opus." This story adds that one branch.


      DECISION: extend resolveSpawnModel (from Story 1) with a rework branch. Pseudocode:

        function resolveSpawnModel({ storyId, role }) {
          const reworkCount = readReworkCount(storyId);          // from sprint-status.yaml
          if (role === "dev" && reworkCount > 0) {
            return DEEP_MODEL;                                    // "claude-opus-4-7"
          }
          return resolveStatic(role);                             // Story 1's resolution
        }

        Reviewer is NOT escalated — the brief's locked decision. Reworked story re-spawned for
        review still uses the reviewer's static-default tier.


      DEEP_MODEL CONSTANT: add DEEP_MODEL = "claude-opus-4-7" to model-tiering-defaults.ts (already
      created in Story 1).


      FILES TO TOUCH:
        - plugins/sprint-orchestrator/packages/mcp-server/src/tools/resolve-spawn-model.ts
          (extend with rework branch)
        - plugins/sprint-orchestrator/packages/mcp-server/src/tools/model-tiering-defaults.ts
          (add DEEP_MODEL constant)
        - plugins/sprint-orchestrator/scripts/e2e.ts (new mini-run, see AC verification)


      AC VERIFICATION (planning-discipline Rule 1 — real MCP tool, real files):
        New mini-run runResolveSpawnModelEscalationMiniRun behind grep tag
        "resolveSpawnModel escalates dev on rework only". Temp directory with real
        sprint-status.yaml + config.yaml. Invokes the registered resolveSpawnModel MCP tool
        against four fixtures:

          * fresh-dev/ — rework_count: 0, role=dev. Resolver returns the static default
            (Sonnet from frontmatter or config).
          * reworked-dev/ — rework_count: 1, role=dev. Resolver returns "claude-opus-4-7"
            REGARDLESS of frontmatter or config (rework escalation overrides).
          * reworked-dev-multiple/ — rework_count: 2, role=dev. Same as above, opus.
            (Verifies the rule is "> 0", not "== 1".)
          * reworked-reviewer/ — rework_count: 1, role=reviewer. Resolver returns the static
            default (Sonnet). Reviewer is NEVER escalated by this rule.


      OUT OF SCOPE FOR STORY 2:
        - Reviewer escalation (deferred — brief decision).
        - Story-level tier override field (deferred).
        - AC-complexity heuristic (deferred).
        - Model history schema (deferred — feeds later retros work).
  - id: "3"
    title: Ship gate — pnpm e2e + verify green
    status: ready
    depends_on:
      - "1"
      - "2"
    acceptance_criteria:
      checks:
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator e2e
          expect_exit: 0
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator verify
          expect_exit: 0
    orchestrator:
      rework_count: 0
    notes: >
      Per planning-discipline rule 3. Full unfiltered e2e + verify proves stories 1-2 integrate
      cleanly and don't regress existing assertions.


      If this fails, the reviewer should rework the offending prior story, not record this one as
      failed.
