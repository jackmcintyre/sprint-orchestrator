    title: /sprint-orchestrator:adopt skill with LLM drafter, user review, validate-and-write helper
    status: done
    depends_on: []
    acceptance_criteria:
      checks:
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator verify
          expect_exit: 0
    orchestrator:
      claimed_by: dev-20260513-adopt-1
      claimed_at: 2026-05-13T11:56:26.663Z
      rework_count: 0
      completed_at: 2026-05-13T12:00:01.141Z
      summary: Added /sprint-orchestrator:adopt skill and pure-TS validateAndWriteBacklog helper reusing
        lintSprint + getOrInitConfig, with in-flight guard and atomic write.
      artefacts:
        - git:901e958b9660a35dfdff775a34a22f8c26fb7415
        - plugins/sprint-orchestrator/skills/adopt/SKILL.md
        - plugins/sprint-orchestrator/packages/mcp-server/src/tools/adopt-write.ts
    notes: >
      Build the universal source-agnostic adopt skill plus a pure-TS validate-and-write helper.


      Full BMad story spec:
        _bmad-output/implementation-artifacts/1-1-sprint-orchestrator-adopt-path-drafts-a-backlog-via-llm-subagent-pauses-for-user-review-validates-and-writes.md

      What to build:
        - New skill: plugins/sprint-orchestrator/skills/adopt/SKILL.md
            * Argument: <path> (required), --force flag (optional)
            * Spawns an LLM subagent (clean context) to read the source file and propose a conforming sprint-status.yaml draft
            * Presents the proposal to the user with a diff-style preview against the existing sprint-status.yaml
            * Pauses for accept / edit / abort
            * On accept: calls validateAndWriteBacklog
            * Producer-agnostic: no mention of BMad, Linear, Notion, etc. in the skill body
        - New helper: plugins/sprint-orchestrator/packages/mcp-server/src/tools/adopt-write.ts
            * export validateAndWriteBacklog({ proposalYaml, destPath, existingYaml, force })
            * Reuses lintSprint from packages/mcp-server/src/tools/lint-sprint.ts (do NOT duplicate schema logic)
            * Uses getOrInitConfig to resolve sprintStatusPath (do NOT hardcode)
            * Atomic write: temp file + fs.rename
            * Refuses if existing sprint-status.yaml has any story with status: in_progress and force is false; the refusal message names the in-flight story id
            * Returns { ok: true, dest } or { ok: false, reason }
            * Pure function — directly testable from scripts/e2e.ts (no implicit globals)

      Coupling discipline (NFR1, NFR2):
        - The orchestrator core (MCP server, state machine, process-backlog skill) MUST NOT import adopt-write.ts or anything from skills/adopt/. Coupling is one-way: adopt depends on lintSprint + getOrInitConfig; neither depends on adopt.
        - Skill body and helper file MUST NOT name any specific producer (BMad/Linear/Notion/Jira). Producer names live only in README (Story 3).

      AC verification:
        - pnpm --dir plugins/sprint-orchestrator verify must pass (build + typecheck + lint + unit tests).
        - Behavioral correctness is verified by Story 2's deterministic e2e mini-run; Story 1's AC is the compile/lint gate only.
  - id: "2"
    title: Deterministic e2e coverage for adopt — validation refusal, in-flight refusal, golden-fixture
      happy path
    status: ready
    depends_on:
      - "1"
    acceptance_criteria:
      checks:
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator e2e --grep "adopt validation refusal in-flight refusal
            golden-fixture happy path"
          expect_exit: 0
    orchestrator:
      rework_count: 0
    notes: >
      Add a deterministic e2e mini-run for the adopt helper. The LLM drafting step is NOT covered by
      this story (explicit non-goal — testing live LLM output makes assertions flaky).


      Full BMad story spec:
        _bmad-output/implementation-artifacts/1-2-deterministic-e2e-coverage-for-adopt-validation-refusal-in-flight-refusal-golden-fixture-happy-path.md

      What to build:
        - Extend plugins/sprint-orchestrator/scripts/e2e.ts with runAdoptValidateAndWriteMiniRun().
        - Wire into main() behind grep tag exactly: "adopt validation refusal in-flight refusal golden-fixture happy path"
        - Golden fixture YAMLs in scripts/fixtures/adopt/ (or match the existing convention if one exists):
            * valid-proposal.yaml — minimal conforming backlog
            * invalid-proposal.yaml — fails lintSprint
            * in-flight-existing.yaml — represents a pre-existing destination with a story in status: in_progress

      Assertions:
        (a) Happy path: valid proposal + empty dest -> ok: true, dest contents equal fixture byte-for-byte.
        (b) Invalid proposal: pre-write a known existing file, invoke with invalid-proposal -> ok: false, reason contains verbatim lint error, dest file is byte-identical to what was pre-written (SHA compare or buffer compare before/after).
        (c) In-flight refusal: pre-write in-flight-existing.yaml as dest, invoke with valid proposal and force: false -> ok: false, reason names the in-flight story id, dest byte-identical.

      Conventions to follow:
        - Prior mini-runs to mirror: runRunSprintWrapperMiniRun, runProcessBacklogEndOfRunSummaryLinesMiniRun (both in scripts/e2e.ts from prior sprints).
        - Use temp dirs for destinations.
        - Direct import of validateAndWriteBacklog from packages/mcp-server/src/tools/adopt-write.ts — do not invoke the skill body.
