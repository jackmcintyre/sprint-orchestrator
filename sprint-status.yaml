sprint_id: goal-adoption
stories:
  - id: "1"
    title: /sprint-orchestrator:run-sprint wrapper skill with story-count-based turn cap
    status: done
    depends_on: []
    acceptance_criteria:
      checks:
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator e2e --grep "run-sprint wrapper computes turn cap and
            invokes goal with the drain condition"
          expect_exit: 0
    orchestrator:
      claimed_by: dev-20260513-1
      claimed_at: 2026-05-13T10:44:31.720Z
      completed_at: 2026-05-13T10:49:24.529Z
      summary: Shipped run-sprint wrapper skill that computes turn cap from story count and invokes /goal
        with the canonical drain condition, plus refusal paths for missing/drained backlogs.
      rework_count: 0
      artefacts:
        - git:332ec0ab3b0c92aa271f2b1201d9df5f7ef10596
        - plugins/sprint-orchestrator/skills/run-sprint/SKILL.md
        - plugins/sprint-orchestrator/packages/mcp-server/src/tools/plan-run-sprint.ts
        - plugins/sprint-orchestrator/packages/mcp-server/src/tools/get-or-init-config.ts
        - plugins/sprint-orchestrator/scripts/e2e.ts
    notes: |
      PROBLEM: today the user has to type the full /goal invocation
      every time they run a sprint:
        /goal /sprint-orchestrator:process-backlog UNTIL every story
          in sprint-status.yaml is status=done or status=failed, OR
          stop after 30 turns
      That's 25 words of boilerplate, and the turn cap is a guess.

      DECISION: ship a thin wrapper skill at
      plugins/sprint-orchestrator/skills/run-sprint/SKILL.md that:
        - Reads sprint-status.yaml from the working directory.
        - Counts stories (N).
        - Reads turn_cap_per_story from .sprint-orchestrator/config.yaml
          (default 3 — matches per-story worst case under the current
          rework cap of 2).
        - Computes turn_cap = ceil(N * turn_cap_per_story).
        - Invokes /goal with the canonical drain condition:
            /goal /sprint-orchestrator:process-backlog UNTIL every
              story in sprint-status.yaml is status=done or
              status=failed, OR stop after <turn_cap> turns
        - Zero other logic. The wrapper is a thin entrypoint.

      BACKLOG VALIDATION (refusal paths):
        - Missing sprint-status.yaml: refuse with "no backlog found:
          expected sprint-status.yaml at <cwd>/sprint-status.yaml.
          Copy a backlog file there before running." No /goal call.
        - Drained sprint-status.yaml (every story done or failed):
          refuse with "nothing to run — backlog is drained.
          Stories: <D> done, <F> failed." No /goal call.

      CONFIG SHAPE (additive to .sprint-orchestrator/config.yaml):
        turn_cap_per_story: 3   # optional; default 3

      MUSCLE-MEMORY PRESERVATION: existing invocation paths
      (/sprint-orchestrator:process-backlog direct, /loop 5m ...,
      raw /goal ...) must keep working identically. No changes to
      process-backlog skill's surface or to the MCP tools.

      INTEGRATION AC: new e2e assertion sets up a 3-story fixture
      sprint with turn_cap_per_story unset (defaults to 3), invokes
      the wrapper skill's computation step (mock the /goal call —
      we're testing what condition string the wrapper would emit,
      not actually running /goal in the e2e harness), and asserts:
        - emitted command string includes "stop after 9 turns"
          (3 stories * 3 default = 9)
        - emitted command string includes the canonical drain
          condition verbatim
      A second assertion variant overrides turn_cap_per_story: 5 in
      the fixture config and asserts cap = 15.
      A third variant fixtures a drained sprint (all stories done)
      and asserts the wrapper refuses without emitting any command.
      A fourth variant fixtures a missing sprint-status.yaml and
      asserts the wrapper refuses with the expected message.

      FILES TO TOUCH:
        - plugins/sprint-orchestrator/skills/run-sprint/SKILL.md (new)
        - plugins/sprint-orchestrator/.sprint-orchestrator/config.example.yaml
          (or wherever the config example lives — add the new field
          with its default, commented)
        - plugins/sprint-orchestrator/scripts/e2e.ts
          (new mini-run + assertion + grep tag)
  - id: "2"
    title: Three distinct end-of-run summary lines in process-backlog (drain / cap-stop / blocked)
    status: done
    depends_on: []
    acceptance_criteria:
      checks:
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator e2e --grep "process-backlog prints distinct end-of-run
            summary lines for drain cap-stop and blocked"
          expect_exit: 0
    orchestrator:
      claimed_by: dev-20260513-2
      claimed_at: 2026-05-13T10:49:33.660Z
      completed_at: 2026-05-13T10:53:54.151Z
      summary: Codified three distinct end-of-run summary lines (drain / cap-stop / blocked) in
        process-backlog SKILL.md and added e2e mini-runs asserting each line shape.
      rework_count: 0
      artefacts:
        - git:c9c65d74700cbedcdc7a3a98799cbaff645e0996
        - plugins/sprint-orchestrator/skills/process-backlog/SKILL.md
        - plugins/sprint-orchestrator/scripts/e2e.ts
        - plugins/sprint-orchestrator/packages/mcp-server/src/tools/format-end-of-run-line.ts
    notes: >
      PROBLEM: the /goal evaluator (a Haiku-class model) reads the

      conversation transcript to decide whether the goal condition

      is met. For our condition ("every story in sprint-status.yaml

      is status=done or status=failed"), it needs to see something

      in the transcript that lets it confidently say yes — without

      mistaking a partial run, a hard-cap stop, or a blocked state

      for a drain.


      Today the process-backlog skill ends with a terse summary that

      worked once in testing but hasn't been validated for sprints

      with failures, sprints that hit the 5-story hard cap, or

      sprints that end on a blocked: signal.


      DECISION: codify three distinct, greppable end-of-run lines so

      the evaluator (and humans) can disambiguate at a glance.


      BEHAVIOUR (skills/process-backlog/SKILL.md):
        - When the main loop exits because getReadyStories returned
          []:
            Final printed line is exactly:
              "Sprint drain confirmed: 0 ready stories remaining. Outcome: <D> done, <F> failed."
            Where D = count of stories with status=done in
            sprint-status.yaml, F = count of stories with
            status=failed.
        - When the main loop exits because the 5-story hard cap was
          hit (not drain):
            Final printed line is exactly:
              "Sprint paused at hard cap: <K> ready stories remaining. Outcome so far: <D> done, <F> failed."
            Where K = current getReadyStories count, D/F as above.
        - When the main loop exits because the reviewer returned
          "blocked: ..." (story 2 of orchestrator-reviewer-fixes):
            Final printed line is exactly:
              "Sprint blocked: <reason>. <K> ready stories remaining."

      Line shapes are FIXED. Future changes to the surrounding

      narrative are fine; the final-line grammar is the contract

      with the /goal evaluator and must not drift.


      INTEGRATION AC: new e2e assertion runs three mini-sprints

      (one drain, one cap-stop, one blocked) via the existing

      process-backlog skill harness, captures each run's transcript,

      and asserts:
        - drain run: final line matches "Sprint drain confirmed: 0 ready stories remaining. Outcome: <int> done, <int> failed."
        - cap-stop run: final line matches "Sprint paused at hard cap: <int> ready stories remaining. Outcome so far: <int> done, <int> failed."
        - blocked run: final line matches "Sprint blocked: <reason>. <int> ready stories remaining."

      FILES TO TOUCH:
        - plugins/sprint-orchestrator/skills/process-backlog/SKILL.md
          (end-of-run summary contract: three distinct lines as
           specified above)
        - plugins/sprint-orchestrator/scripts/e2e.ts
          (new mini-run + 3 assertions + grep tag)

      Independent of story 1 — different surface (skill end-of-run

      output vs new wrapper skill).
  - id: "3"
    title: README documents /sprint-orchestrator:run-sprint as recommended entrypoint
    status: done
    depends_on:
      - "1"
      - "2"
    acceptance_criteria:
      checks:
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator e2e --grep "README documents run-sprint wrapper computed
            turn cap and end-of-run summary lines"
          expect_exit: 0
    orchestrator:
      claimed_by: dev-20260513-3
      claimed_at: 2026-05-13T10:54:04.344Z
      completed_at: 2026-05-13T10:56:52.043Z
      summary: README's Running-a-sprint section now leads with /sprint-orchestrator:run-sprint, documents
        the computed turn cap formula, raw /goal manual override, /loop fallback, and the three
        end-of-run summary line shapes; new e2e assertions cover all of this.
      rework_count: 0
      artefacts:
        - git:054ac6428d3e932be3eafdb883612aca0b197d7d
        - plugins/sprint-orchestrator/README.md
        - plugins/sprint-orchestrator/scripts/e2e.ts
    notes: |
      PROBLEM: even with the wrapper skill and tightened summary
      lines in place, the README still tells users to run
      /loop 5m /sprint-orchestrator:process-backlog. Muscle memory
      will steer users away from /goal unless docs lead with it.

      DECISION: rewrite the README's "Running a sprint" section to
      lead with /sprint-orchestrator:run-sprint; document raw /goal
      as the manual override for ad-hoc conditions; mention /loop
      only as a fallback for when /goal misbehaves.

      BEHAVIOUR (README.md):
        - "Running a sprint" section starts with /sprint-orchestrator:run-sprint
          and a one-line description.
        - Explains the computed turn cap rule:
            cap = ceil(story_count * turn_cap_per_story)
            default turn_cap_per_story = 3
            override via .sprint-orchestrator/config.yaml
        - Documents the raw /goal invocation as manual override:
            /goal /sprint-orchestrator:process-backlog UNTIL every
              story in sprint-status.yaml is status=done or
              status=failed, OR stop after <N> turns
          (canonical condition string shown verbatim so users can
          adapt it.)
        - Mentions /loop 5m /sprint-orchestrator:process-backlog as
          fallback for /goal misbehaviour. Not the primary path.
        - Documents the three end-of-run summary lines from story
          2 so readers can recognise drain vs cap-stop vs blocked
          when watching a run.

      INTEGRATION AC: new e2e assertion reads README.md and asserts:
        - "/sprint-orchestrator:run-sprint" appears before any
          mention of /loop in the Running-a-sprint section.
        - The exact string "ceil(story_count * turn_cap_per_story)"
          (or equivalent — the formula must be present and
          unambiguous) appears in the README.
        - All three end-of-run line shapes from story 2 appear
          verbatim (or close enough that future grep-by-prefix
          works).

      FILES TO TOUCH:
        - plugins/sprint-orchestrator/README.md
        - plugins/sprint-orchestrator/scripts/e2e.ts
          (new mini-run + assertions + grep tag)

      Depends on stories 1 and 2 because the README documents both
      the wrapper and the summary-line shapes. Should be last
      substantive story before ship gate.
