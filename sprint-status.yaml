        - plugins/sprint-orchestrator/packages/mcp-server/src/tools/mark-story-complete.ts
        - plugins/sprint-orchestrator/packages/mcp-server/src/tools/mark-story-failed.ts
        - plugins/sprint-orchestrator/packages/mcp-server/src/tools/mark-story-needs-rework.ts
        - plugins/sprint-orchestrator/packages/mcp-server/src/tools/plan-run-sprint.ts
        - plugins/sprint-orchestrator/packages/mcp-server/src/tools/prepare-story-branch.ts
        - plugins/sprint-orchestrator/packages/mcp-server/src/tools/record-story-reopen.ts
        - plugins/sprint-orchestrator/packages/mcp-server/src/tools/release-stale-claims.ts
        - plugins/sprint-orchestrator/packages/mcp-server/src/tools/set-config-pr-per-story.ts
        - plugins/sprint-orchestrator/scripts/e2e.ts
        - plugins/sprint-orchestrator/skills/run-sprint/SKILL.md
        - plugins/sprint-orchestrator/.gitignore
    notes: >
      Problem: sprint-status.yaml committed to per-story branch on every state mutation produces B4
      (claim/read race), B5 (auto-merge orphans), B6 (per-branch divergence). State machine is
      workspace-scoped but git forces it branch-scoped.


      Concrete actions:

      - Move canonical state file to .sprint-orchestrator/state.yaml (or .json — dev picks). Keep
      schema identical.

      - Add .sprint-orchestrator/state.* to .gitignore. Idempotent migration: if old
      sprint-status.yaml exists at repo root AND new state file does not, move it; leave deprecation
      note pointing to new location.

      - Rewrite all MCP write tools (claimStory, markDevReturned, recordStorySuccess,
      recordStoryFailure, recordStoryRework, recordStoryReopen, releaseStaleClaims,
      prepareStoryBranch, setConfigPrPerStory) to read/write new location AND STOP creating git
      commits for state mutations. The `chore(sprint): persist <id> <transition>` commit pattern
      goes away entirely.

      - Every state mutation appends to .sprint-orchestrator/run.log with full detail (story_id,
      transition, agent_id, timestamp, reason if applicable).

      - commitStoryArtefacts keeps committing dev's actual code changes only. State updates no
      longer ride along.

      - skills/run-sprint/SKILL.md pre-flight UNCOMMITTED_BACKLOG_REFUSAL check becomes obsolete;
      replace with migration prompt OR remove cleanly.
  - id: "2"
    title: Reviewer empty-commit on zero-diff ship-gate stories (B8 fix)
    status: ready
    depends_on:
      - "1"
    acceptance_criteria:
      checks:
        - type: shell
          cmd: grep -rq SHIP_GATE_EMPTY_COMMIT_MESSAGE_PREFIX
            plugins/sprint-orchestrator/packages/mcp-server/src/tools
          expect_exit: 0
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator e2e --grep "zero-diff story under pr_per_story=true
            successfully opens a PR via empty commit"
          expect_exit: 0
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator verify
          expect_exit: 0
    orchestrator:
      rework_count: 0
    notes: >
      Problem: verification-only stories make zero commits. gh pr create returns "No commits between
      main and the story branch", no PR opens, state machine refuses recordStorySuccess. Every
      sprint's final ship-gate story fails for this structural reason.


      Concrete actions:

      - In reviewer flow (agents/reviewer.md OR commitStoryArtefacts MCP tool — dev decides), detect
      zero diff vs base AFTER dev returns. If zero diff: `git commit --allow-empty -m
      "chore(ship-gate): <story-id> verification only — see sprint state for AC results"` before
      push.

      - Phrase-lock the empty-commit message via new constant SHIP_GATE_EMPTY_COMMIT_MESSAGE_PREFIX.
      Module home: existing reviewer-related module if any, else new ship-gate-phrases.ts under
      plugins/sprint-orchestrator/packages/mcp-server/src/tools/.

      - Trigger is structural (zero commits) not name-based.
  - id: "3"
    title: Auto-clean stale per-story branches on prepareStoryBranch and recordStoryFailure (B9 fix)
    status: ready
    depends_on:
      - "1"
      - "2"
    acceptance_criteria:
      checks:
        - type: shell
          cmd: grep -rq STALE_BRANCH_HAS_REAL_WORK_REFUSAL
            plugins/sprint-orchestrator/packages/mcp-server/src/tools
          expect_exit: 0
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator e2e --grep "prepareStoryBranch auto-cleans stale
            bookkeeping-only branch"
          expect_exit: 0
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator e2e --grep "prepareStoryBranch refuses to delete branch
            with real feat/fix commits"
          expect_exit: 0
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator e2e --grep "recordStoryFailure cleans up local and
            remote per-story branches"
          expect_exit: 0
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator verify
          expect_exit: 0
    orchestrator:
      rework_count: 0
    notes: >
      Problem: stale local and remote branches from prior failed runs block prepareStoryBranch with
      "fatal: a branch named '<id>-<slug>' already exists". Today required 3 human approval prompts
      on a single story.


      Concrete actions:

      - prepareStoryBranch pre-flight: if local branch with target name exists, inspect commits vs
      configured default_base. If all commits are orchestrator bookkeeping (`chore(sprint):...`) or
      pure ship-gate empty commits (post-Story 2), delete and recreate. If any `feat(<id>):` or
      `fix(<id>):` commit exists, refuse with clear message saying branch contains unmerged work —
      do not auto-delete.

      - Same logic for remote — fetch first, inspect, delete if bookkeeping-only, refuse if real
      work.

      - recordStoryFailure deletes both local and remote per-story branches UNLESS story has merged
      PR artefacts on it (safety net). On reopen, branch is recreated fresh.

      - Phrase-lock refusal messages via new constant STALE_BRANCH_HAS_REAL_WORK_REFUSAL.
  - id: "4"
    title: Ship gate
    status: ready
    depends_on:
      - "1"
      - "2"
      - "3"
    acceptance_criteria:
      checks:
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator e2e
          expect_exit: 0
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator verify
          expect_exit: 0
    orchestrator:
      rework_count: 0
    notes: >
      Verification-only. Tests B8 fix BY BEING zero-diff under pr_per_story=true. Depends on 1, 2,
      3.


      Manual smoketest (recorded in reviewer summary):

      1. State file at .sprint-orchestrator/state.yaml, gitignored, NOT in git status after
      mutation.

      2. `git log sprint-status.yaml` returns nothing on fresh sprint.

      3. Small 2-story sprint with pr_per_story=true drains cleanly, no human approvals for branch
      cleanup mid-run.

      4. Ship gate (this story) reaches done — proves B8 fixed.

      5. Interrupt mid-flight (Ctrl-C after claimStory before reviewer), re-launch — next run clears
      stuck in_progress via releaseStaleClaims cleanly, no branch debris.
