sprint_id: bmad-adaptor
stories:
  - id: "1"
    title: /sprint-orchestrator:adapt-bmad — deterministic BMad → orchestrator adaptor skill + pure helper
    status: done
    depends_on: []
    acceptance_criteria:
      checks:
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator verify
          expect_exit: 0
    orchestrator:
      claimed_by: dev-20260513-bmad-1
      claimed_at: 2026-05-13T13:16:16.812Z
      completed_at: 2026-05-13T13:40:46.275Z
      summary: Shipped deterministic /sprint-orchestrator:adapt-bmad skill plus pure adaptBmadOutput
        helper that converts BMad epics + story Verification sections into a conforming
        sprint-status.yaml.
      rework_count: 0
      artefacts:
        - git:870c27e4e9db88275ab3db7449c0d8ba50eb53d8
        - plugins/sprint-orchestrator/packages/mcp-server/src/tools/adapt-bmad.ts
        - plugins/sprint-orchestrator/skills/adapt-bmad/SKILL.md
        - sprint-status.yaml
    notes: >
      PROBLEM: today the only way into the orchestrator from BMad-authored stories is the universal
      /sprint-orchestrator:adopt skill (LLM-mediated, source-agnostic, requires user review). For
      BMad — a producer we use daily — we want a faster, deterministic fast path that validates the
      adaptor pattern we documented in the prior sprint.


      DECISION: ship a separate skill /sprint-orchestrator:adapt-bmad <bmad-output-dir> that reads
      BMad's epic doc + per-story .md files and produces a conforming sprint-status.yaml
      deterministically. No LLM step. Universal /adopt stays producer-agnostic; adapt-bmad is the
      producer-named fast path.


      BMAD-SIDE CONVENTION (defines the schema this adaptor consumes):
        - Each BMad story file in the implementation-artifacts dir must contain a "## Verification" section. The section contains one or more shell commands the orchestrator should run to verify the story's AC, in the format:
            ```
            ## Verification

            ```shell
            pnpm --dir plugins/sprint-orchestrator e2e --grep "<grep-tag>"
            ```
            ```
        - Each fenced shell block becomes one `type: shell` check in the orchestrator's acceptance_criteria.
        - Exit code is implicit: 0 for success (typical case). To assert a non-zero exit, the convention is a comment line `# expect_exit: <N>` inside the fence (uncommon; covered by the spec but not the goldens this sprint).
        - If a story file lacks the Verification section, the adaptor refuses with a clear message naming the story file. No defaults; we want authoring discipline, not silent fallback.

      ADAPTOR BEHAVIOUR:
        - Reads BMad's epic doc at <bmad-output-dir>/planning-artifacts/epics.md to extract the story sequence (epic.story IDs and titles).
        - Reads each BMad story file at <bmad-output-dir>/implementation-artifacts/<story-key>.md.
        - Extracts the Verification section's shell command(s) into acceptance_criteria.checks.
        - Sequential dependencies inferred from BMad story order: story 1-2 depends_on 1-1, 1-3 depends_on 1-2, etc. (Future enhancement: explicit dependency declarations in BMad story frontmatter. Out of scope this sprint.)
        - Story id format: orchestrator-friendly sequential integers ("1", "2", "3", ...) regardless of BMad's "1.1" / "1.2" epic.story numbering. The BMad ID is preserved in the notes field for traceability.
        - The notes field is populated with a short pointer to the BMad story file path; the dev/reviewer can read it for full context (no need to inline the entire BMad spec).
        - Output: a conforming sprint-status.yaml that passes lintSprint. The adaptor writes via the same atomic helper used by /adopt (reuse validateAndWriteBacklog from packages/mcp-server/src/tools/adopt-write.ts).

      FILES TO TOUCH:
        - plugins/sprint-orchestrator/skills/adapt-bmad/SKILL.md (NEW)
            * Argument: <bmad-output-dir> (required, defaults to "_bmad-output" if conventional).
            * Optional: --force (passed through to validateAndWriteBacklog).
            * No LLM subagent. No user review step (deterministic — what you put in is what you get).
        - plugins/sprint-orchestrator/packages/mcp-server/src/tools/adapt-bmad.ts (NEW)
            * export adaptBmadOutput({ bmadOutputDir }): { ok: true, proposalYaml } | { ok: false, reason }
            * Pure function — directly testable from scripts/e2e.ts (no implicit globals, no file writes).
            * Parses BMad epic doc + story files. Refuses on missing Verification section, missing epic doc, missing story file, or malformed shell fences.
        - plugins/sprint-orchestrator/skills/adapt-bmad/SKILL.md should call adaptBmadOutput() to produce the YAML, then hand off to validateAndWriteBacklog from adopt-write.ts for the actual schema validation + atomic write.

      COUPLING DISCIPLINE:
        - Orchestrator core (MCP server, state machine, process-backlog skill) MUST NOT import adapt-bmad.ts or anything from skills/adapt-bmad/. Adapter depends on lintSprint, getOrInitConfig, and validateAndWriteBacklog (reused from adopt-write.ts); none of those depend on adapter.
        - The /adopt skill MUST NOT reference adapt-bmad. They are siblings, both depending on the schema, neither depending on the other.

      AC VERIFICATION:
        - pnpm --dir plugins/sprint-orchestrator verify must pass (build + typecheck + lint + unit tests). Behavioural correctness is Story 2's e2e responsibility.

      OUT OF SCOPE:
        - Auto-detection of BMad shape inside /adopt. /adopt stays oblivious.
        - Parallel dependency declarations beyond sequential. BMad story files may carry a `depends_on:` frontmatter field in a future sprint.
        - Editing existing BMad-authored story files to add Verification sections. Story 2's goldens are net-new fixtures.
  - id: "2"
    title: Deterministic e2e coverage for adapt-bmad — happy path, missing Verification refusal,
      malformed input refusal
    status: done
    depends_on:
      - "1"
    acceptance_criteria:
      checks:
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator e2e --grep "adapt-bmad happy path missing-verification
            refusal malformed refusal"
          expect_exit: 0
    orchestrator:
      claimed_by: dev-20260513-bmad-2
      claimed_at: 2026-05-13T13:40:58.795Z
      rework_count: 0
      completed_at: 2026-05-13T13:46:44.225Z
      summary: Added adapt-bmad e2e mini-run with happy/missing-verification/malformed fixtures locking in
        adaptor behaviour.
      artefacts:
        - git:ee86e8505a61fe8dd5aab5eff3ce03b7ccbca698
        - plugins/sprint-orchestrator/scripts/e2e.ts
        - plugins/sprint-orchestrator/scripts/fixtures/adapt-bmad/
    notes: >
      PROBLEM: Story 1 ships the deterministic adaptor. Story 2 locks the behaviour with e2e
      assertions that exercise the helper directly (not the skill body — same approach we used for
      adopt-write).


      WHAT TO BUILD:
        - Extend plugins/sprint-orchestrator/scripts/e2e.ts with runAdaptBmadMiniRun() behind grep tag "adapt-bmad happy path missing-verification refusal malformed refusal".
        - Three golden-fixture BMad directories under plugins/sprint-orchestrator/scripts/fixtures/adapt-bmad/:
            * happy/ — a minimal valid BMad output: planning-artifacts/epics.md with 1 epic, 2 stories, sequential; implementation-artifacts/<story-key>.md files for both, each with a valid Verification section.
            * missing-verification/ — same shape as happy/, but the second story file omits the Verification section.
            * malformed/ — same shape as happy/, but the first story file has a broken shell fence (e.g. unclosed code block, or no shell command inside the fence).

      ASSERTIONS:
        (a) Happy path: adaptBmadOutput({ bmadOutputDir: ".../happy" }) → { ok: true }. The proposalYaml parses as YAML, lintSprint accepts it, the story array has length 2, each story has the expected id ("1", "2"), expected title (matching the BMad story title), and expected acceptance_criteria.checks (matching the shell command from the Verification section). depends_on: [] for story 1; depends_on: ["1"] for story 2.
        (b) Missing Verification: adaptBmadOutput on the missing-verification fixture → { ok: false }. The reason names the offending story file. No partial output. No file write attempted (helper is pure — no side effects to verify, but assert reason is informative).
        (c) Malformed shell fence: adaptBmadOutput on the malformed fixture → { ok: false }. The reason names the offending story file and indicates the malformed-fence nature.

      CONVENTIONS:
        - Mirror prior mini-runs: runAdoptValidateAndWriteMiniRun, runReadmeDocumentsAdoptAndAdaptorPatternMiniRun.
        - Use the existing scripts/fixtures/ convention from Story 2 of the adopt-skill sprint.
  - id: "3"
    title: README documents the adapt-bmad fast path and the BMad-side Verification section convention
    status: ready
    depends_on:
      - "1"
      - "2"
    acceptance_criteria:
      checks:
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator e2e --grep "README documents adapt-bmad fast path and
            verification convention"
          expect_exit: 0
    orchestrator:
      rework_count: 0
    notes: >
      PROBLEM: The README documents universal /adopt and names the adaptor pattern, but doesn't yet
      document the first concrete adaptor (adapt-bmad) or the Verification section convention that
      BMad story authors must follow.


      BEHAVIOUR (README.md, in the "Running a sprint" section's adaptor-pattern paragraph):
        - Cite /sprint-orchestrator:adapt-bmad as the first concrete adaptor shipped, fitting the documented adaptor-pattern slot.
        - Explain when to use adapt-bmad vs universal /adopt: adapt-bmad is deterministic and instant, suited for BMad-authored stories; /adopt remains the catch-all for any other source.
        - Document the BMad-side Verification section convention with a concrete example showing the fenced shell block.
        - Make explicit: the convention is a BMad-side authoring responsibility. The adaptor refuses cleanly when the section is missing — no silent fallback.

      LOCK ASSERTION PHRASES:
        - Mirror readme-adopt-phrases.ts and readme-runsprint-phrases.ts.
        - New module: plugins/sprint-orchestrator/packages/mcp-server/src/tools/readme-adapt-bmad-phrases.ts.
        - Export: ADAPT_BMAD_INTRO (string), VERIFICATION_SECTION_EXAMPLE (string, includes the fenced shell example), VERIFICATION_REQUIREMENT_STATEMENT (string).

      INTEGRATION AC:
        - New e2e mini-run runReadmeDocumentsAdaptBmadMiniRun() behind grep tag "README documents adapt-bmad fast path and verification convention".
        - Assertions:
            (a) "Running a sprint" section contains ADAPT_BMAD_INTRO verbatim.
            (b) Section contains VERIFICATION_REQUIREMENT_STATEMENT verbatim.
            (c) Section contains VERIFICATION_SECTION_EXAMPLE verbatim (the fenced shell block as a literal substring).
            (d) Section explicitly references both adapt-bmad and the universal adopt, so a reader sees the choice.

      OUT OF SCOPE:
        - Editing other README sections.
        - Authoring a full schema doc.
