sprint_id: pr-per-story-1-triage
stories:
  - id: "1"
    title: prepareStoryBranch refuses if default_base lacks the orchestrator schema
    status: done
    depends_on: []
    acceptance_criteria:
      checks:
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator e2e --grep "refuses when default_base lacks orchestrator
            schema"
          expect_exit: 0
    orchestrator:
      claimed_by: dev-loop-20260513
      claimed_at: 2026-05-13T04:46:35.348Z
      rework_count: 0
      completed_at: 2026-05-13T05:30:00.000Z
      manual_recovery: "code on dbbd276; AC re-verified post-fact; reviewer hard-failed without rework — see follow-up"
    notes: |
      PROBLEM: When invoked on a feature branch whose `default_base`
      (e.g. `main`) lags behind on the orchestrator schema version, the
      per-story branch is rooted at a stale base. State commits then
      diff against the OLD schema, producing 200+ lines of unrelated
      noise that will pollute every story's PR (this is what the
      retest hit on slice 1.1 — 239-line chore commit).

      DECISION: refuse rather than auto-rebase. Rebasing the user's
      `default_base` is a destructive surprise; refusing-with-message
      lets the user fix it explicitly.

      BEHAVIOUR:
        - On first per-story branch creation, prepareStoryBranch reads
          sprint-status.yaml from `default_base` (via `git show
          <default_base>:sprint-status.yaml`).
        - Compare its schema version (or top-level shape) to the
          schema the running MCP server expects.
        - If mismatch: return { branch: null, skipped: true,
          reason: "default_base-stale", message: "default_base '<X>'
          is missing orchestrator schema version <Y>. Either rebase
          '<X>' onto your invocation branch or set default_base in
          .sprint-orchestrator/config.yaml." }.
        - If `default_base` == current HEAD, skip the check.
        - process-backlog skill: when prepareStoryBranch returns
          skipped=true with reason="default_base-stale", surface the
          message and STOP the run. Do NOT silently fall back to
          shared-branch mode — that hides the misconfiguration.

      INTEGRATION AC: new e2e assertion sets up a temp repo with
      `default_base=main`, advances the invocation branch with a
      schema-shaped change, drives one story with pr_per_story=true,
      asserts prepareStoryBranch returns reason="default_base-stale"
      and HEAD did not move.

      FILES TO TOUCH:
        - packages/mcp-server/src/tools/prepare-story-branch.ts
        - packages/mcp-server/__tests__/tools.test.ts (unit)
        - scripts/e2e.ts (new assertion + grep tag)
        - skills/process-backlog/SKILL.md (handle the skipped reason)
  - id: "2"
    title: prepareStoryBranch roots from the last completed dependency's branch tip
    status: ready
    depends_on:
      - "1"
    acceptance_criteria:
      checks:
        - type: shell
          cmd: "pnpm --dir plugins/sprint-orchestrator e2e --grep \"branch-per-story: dependent story's branch
            is rooted at the dependency's branch tip\""
          expect_exit: 0
    orchestrator:
      rework_count: 0
    notes: |
      PROBLEM: With per-story branches all rooted from `default_base`
      (typically `main`), a story whose `depends_on` includes an
      already-finished story can't see its predecessor's commits. Dev
      subagent then either fails its AC or manually rebases — both
      bad. The retest hit this between stories 1.1 and 1.2.

      BEHAVIOUR:
        - prepareStoryBranch reads `depends_on` for the target story.
        - If non-empty AND every listed dep has status=done AND each
          dep has `orchestrator.branch` populated AND each branch
          still exists locally:
            - Root the new per-story branch from the last (most recent
              `completed_at`) dep's branch tip instead of `default_base`.
            - Record the chosen base on `orchestrator.base_branch`.
        - If any dep is missing a branch (e.g. it ran with
          pr_per_story=false), fall back to `default_base` and record
          `orchestrator.base_branch_fallback_reason`.
        - Chain (1 -> 2 -> 3): story 3 roots at story 2's tip
          (transitively contains story 1).

      Crucial: this does NOT auto-merge. Each per-story branch is
      still independent; we're just choosing a more useful base so
      the dev agent doesn't see a missing-deps state.

      INTEGRATION AC: e2e harness already has stories A and B with B
      depending on A. Add an assertion that B's per-story branch's
      first commit's parent is reachable from A's branch tip (and
      that A's commits appear in B's `git log`).

      FILES TO TOUCH:
        - packages/mcp-server/src/tools/prepare-story-branch.ts
        - packages/mcp-server/__tests__/tools.test.ts (unit)
        - scripts/e2e.ts (new assertion + grep tag)
        - packages/mcp-server/src/state/schema.ts
          (add orchestrator.base_branch field)
  - id: "3"
    title: Investigate and fix stray cross-session state-persist commits
    status: done
    depends_on: []
    acceptance_criteria:
      checks:
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator e2e --grep "no orchestrator commits appear without a
            tool call in the current session"
          expect_exit: 0
    orchestrator:
      claimed_by: dev-loop-20260513-s3
      claimed_at: 2026-05-13T04:52:19.970Z
      rework_count: 0
      completed_at: 2026-05-13T05:30:00.000Z
      manual_recovery: "code on c2195a1; AC re-verified post-fact; reviewer hard-failed without rework — see follow-up"
    notes: |
      PROBLEM: between two test sessions on the same branch
      (retest-pps-1.1), a commit `chore(sprint): persist 1.1 failure`
      appeared without any orchestrator activity in the new session.
      Reproduction unknown. Possible causes:
        - The MCP server replays a state mutation on restart from
          run.log or some persisted in-flight transaction.
        - A previous session left an orphaned write that landed when
          the new session opened the lock.
        - A hook (post-tool-use stop / commit) ran on restart due to
          a stale claim.

      INVESTIGATION FIRST, THEN FIX:
        Phase A — repro: drive a story to claim, kill the MCP server
        mid-flight (before commitStoryArtefacts), restart, then start
        a fresh session. Observe whether a stray commit appears. If
        yes, write the e2e assertion that catches it.
        Phase B — fix: depends on phase A's findings. Candidates:
          - post-tool-use commit hook ignores stale claims.
          - On server start, do not auto-emit any state mutation —
            require an explicit tool call.
          - releaseStaleClaims releases without committing.

      RISK: this story may be larger than it looks. If phase A repro
      requires heavy harness changes, split into 3a (repro + assertion)
      and 3b (fix). Phase A's deliverable IS a new e2e assertion that
      currently fails — that's the integration AC.

      FILES LIKELY TO TOUCH:
        - packages/mcp-server/src/index.ts
        - packages/mcp-server/src/tools/release-stale-claims.ts
        - packages/hooks/src/post-tool-use.ts
        - scripts/e2e.ts
  - id: "4"
    title: Ship gate — pnpm e2e green
    status: ready
    depends_on:
      - "1"
      - "2"
      - "3"
    acceptance_criteria:
      checks:
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator e2e
          expect_exit: 0
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator verify
          expect_exit: 0
    orchestrator:
      rework_count: 0
    notes: |
      Per planning-discipline.md rule 3: every sprint ends with a ship
      gate that runs the full unfiltered `pnpm e2e` and `pnpm verify`.
      No implementation work — just the contract that stories 1-3
      delivered without regressing existing assertions.

      If this story fails, the sprint cannot close. The reviewer
      should flag the regressed prior story and recordStoryRework on
      it rather than recordStorySuccess on this one.
