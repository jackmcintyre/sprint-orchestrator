sprint_id: orchestrator-reviewer-fixes
stories:
  - id: "1"
    title: Reviewer tries recordStoryRework before recordStoryFailure when dev produced code
    status: done
    depends_on: []
    acceptance_criteria:
      checks:
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator e2e --grep "reviewer escalates to rework, not failure,
            on first AC miss after dev produced code"
          expect_exit: 0
    orchestrator:
      claimed_by: dev-2026-05-13T1
      claimed_at: 2026-05-13T09:49:11.248Z
      completed_at: 2026-05-13T10:01:51.375Z
      summary: Reviewer agent now escalates to recordStoryRework instead of recordStoryFailure on first AC
        miss when dev has produced a feat commit since claim; new e2e assertion guards the
        behaviour.
      rework_count: 0
      artefacts:
        - git:8072b9b8af7cb79b619ec14e23ddd67474409a77
        - plugins/sprint-orchestrator/agents/reviewer.md
        - plugins/sprint-orchestrator/scripts/e2e.ts
        - plugins/sprint-orchestrator/skills/process-backlog/SKILL.md
        - sprint-status.yaml
    notes: |
      PROBLEM: in the pr-per-story-1.1-triage run, two stories
      hard-failed at rework_count: 0 on the first AC miss even though
      the dev subagent had produced a feat commit. The reviewer
      called recordStoryFailure directly, bypassing the rework loop
      entirely. Result: implementation was correct (verified after
      the fact), but the state machine refused failed -> done and
      blocked the dependents.

      DECISION: only call recordStoryFailure on first reviewer pass
      when there is NO new dev code (no feat commit since claim).
      Otherwise call recordStoryRework with the AC failure as the
      feedback string. The existing rework cap will still escalate to
      recordStoryFailure once the dev has had its allotted retries.

      BEHAVIOUR (reviewer subagent prompt, agents/reviewer.md):
        - After running ACs, before deciding success/rework/failure:
          - If any AC failed:
            - If `git log <claimed_at>..HEAD` shows a feat commit
              touching code (not just sprint-status.yaml): call
              recordStoryRework with the failure reason. Return
              "rework: <id> — <reason>".
            - If there is no new dev code: call recordStoryFailure.
              Return "failed: <id> — <reason>" with the same reason.
          - All ACs pass: call recordStorySuccess. Return "done: <id>".
        - On a rework retry where dev has produced new code BUT the
          rework cap has been reached: still call recordStoryFailure
          (the cap path) — recordStoryRework's capReached signal
          handles that automatically.

      INTEGRATION AC: new e2e assertion sets up a story whose AC will
      fail, lets the dev subagent commit a feat that doesn't satisfy
      the AC, then drives the reviewer once and asserts:
        - story.orchestrator.rework_count == 1
        - story.status == "in_progress" (or whatever the rework state
          actually is — see existing rework path)
        - story.status != "failed"
        - sprint-status.yaml has no failed_at on this story

      FILES TO TOUCH:
        - plugins/sprint-orchestrator/agents/reviewer.md
        - plugins/sprint-orchestrator/scripts/e2e.ts
          (new mini-run + assertion + grep tag)
        - plugins/sprint-orchestrator/skills/process-backlog/SKILL.md
          (interpretation of the new "rework:" path stays the same;
          minor wording update to make the contract explicit)
  - id: "2"
    title: Reviewer returns distinct "blocked:" status when an MCP call is rejected
    status: done
    depends_on: []
    acceptance_criteria:
      checks:
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator e2e --grep "reviewer returns blocked status when state
            machine rejects recordStorySuccess"
          expect_exit: 0
    orchestrator:
      claimed_by: dev-2026-05-13T2
      claimed_at: 2026-05-13T10:02:07.654Z
      completed_at: 2026-05-13T10:07:42.534Z
      summary: Reviewer now returns a distinct "blocked:" status when MCP rejects a state-mutation call,
        and the process-backlog skill hard-stops the run on that signal; covered by a new e2e
        mini-run.
      rework_count: 0
      artefacts:
        - git:9dd3c4fe19ab5b4b486c4b714808b49ec38b8b44
        - plugins/sprint-orchestrator/agents/reviewer.md
        - plugins/sprint-orchestrator/skills/process-backlog/SKILL.md
        - plugins/sprint-orchestrator/scripts/e2e.ts
    notes: |
      PROBLEM: in the triage-1 run, the reviewer attempted
      recordStorySuccess on stories that were already in `failed`
      state (re-claimed manually). The MCP server rejected with
      "Cannot transition story X from failed to done", but the
      reviewer returned "done: X" or "failed: X" with the inline
      error text. The orchestrator skill treated the response as a
      normal status line and moved on. The bookkeeping was silently
      broken; only Jack noticed.

      BEHAVIOUR (reviewer subagent prompt, agents/reviewer.md):
        - Wrap every MCP state-mutating call (recordStoryRework,
          recordStorySuccess, recordStoryFailure) in error-aware
          handling.
        - On rejection, return ONE of:
            "blocked: <id> — state-machine rejected <toolName>: <error>"
        - The skill (skills/process-backlog/SKILL.md) treats
          "blocked: ..." as a hard stop signal: log it prominently
          and end the run with that status. Do not continue to the
          next ready story (the bookkeeping issue likely affects
          others).

      INTEGRATION AC: new e2e assertion sets up a story in `failed`
      state, then runs the reviewer pass against it as if AC passed.
      Assert:
        - reviewer's stdout includes "blocked: <id>"
        - story.status remains "failed" (no silent transition)
        - run.log contains a "blocked" event

      FILES TO TOUCH:
        - plugins/sprint-orchestrator/agents/reviewer.md
        - plugins/sprint-orchestrator/skills/process-backlog/SKILL.md
          (new "blocked:" handling — stop the run, surface message)
        - plugins/sprint-orchestrator/scripts/e2e.ts
          (new mini-run + assertion + grep tag)

      Composes naturally with story 1 (both touch the reviewer
      agent's decision flow) but is independent — different code
      paths, different ACs. Don't merge into one story; two integration
      ACs covering two distinct misbehaviours.
  - id: "3"
    title: Add recordStoryReopen MCP tool for state-machine recovery from failed
    status: done
    depends_on: []
    acceptance_criteria:
      checks:
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator e2e --grep "recordStoryReopen transitions a failed story
            back to ready and clears failure fields"
          expect_exit: 0
    orchestrator:
      claimed_by: dev-2026-05-13T3
      claimed_at: 2026-05-13T10:07:48.423Z
      completed_at: 2026-05-13T10:16:52.176Z
      summary: Added recordStoryReopen MCP tool that transitions a failed story back to ready, clears
        failure/claim fields, preserves rework_count, and appends to reopen_history with an audit
        commit.
      rework_count: 0
      artefacts:
        - git:155fbad87ca912803ec194498a6c18d0fcb9220b
        - plugins/sprint-orchestrator/packages/mcp-server/src/tools/record-story-reopen.ts
        - plugins/sprint-orchestrator/packages/mcp-server/src/index.ts
        - plugins/sprint-orchestrator/packages/mcp-server/src/state/schema.ts
        - plugins/sprint-orchestrator/packages/mcp-server/__tests__/tools.test.ts
        - plugins/sprint-orchestrator/scripts/e2e.ts
        - plugins/sprint-orchestrator/README.md
    notes: |
      PROBLEM: even with story 1 landed (reviewer-rework-first), some
      stories will still legitimately reach `failed` (rework cap,
      no-code failures). The triage-1 run showed there's no recovery
      path that doesn't involve YAML surgery. Hand-editing
      sprint-status.yaml defeats the point of having a state machine.

      DECISION: keep `failed` as a meaningful terminal state for the
      automated workflow (the reviewer cannot transition out of it),
      but expose an explicit `recordStoryReopen` tool the human (or a
      future supervisor agent) calls to reset.

      BEHAVIOUR (new MCP tool, prepare-style):
        - recordStoryReopen(storyId, reason): transitions a story
          from `failed` back to `ready`. Clears:
            - orchestrator.failed_at
            - orchestrator.last_failure_reason
            - orchestrator.claimed_by
            - orchestrator.claimed_at
          Preserves:
            - rework_count (for audit — show the prior attempts)
            - notes
            - any base_branch / branch fields from a prior partial run
        - Records on orchestrator.reopen_history[]:
            - { reopened_at, reason, prior_status: "failed",
                prior_failure_reason: "..." }
        - Refuses if status != "failed" (use other tools for other
          transitions — this isn't a free reset).
        - Commits the state mutation as `chore(sprint): reopen <id> —
          <reason>` so the audit trail is in git.

      INTEGRATION AC: new e2e assertion fails a story (drive it
      through to status=failed with rework cap), then calls
      recordStoryReopen. Asserts:
        - story.status == "ready"
        - reopen_history has one entry with the reason
        - rework_count preserved (>= 1)
        - getReadyStories now includes the story
        - chore commit present in git log

      FILES TO TOUCH:
        - plugins/sprint-orchestrator/packages/mcp-server/src/tools/record-story-reopen.ts (new)
        - plugins/sprint-orchestrator/packages/mcp-server/src/index.ts (register tool)
        - plugins/sprint-orchestrator/packages/mcp-server/src/state/schema.ts (add reopen_history)
        - plugins/sprint-orchestrator/packages/mcp-server/__tests__/tools.test.ts (unit)
        - plugins/sprint-orchestrator/scripts/e2e.ts (mini-run + grep tag)
        - plugins/sprint-orchestrator/README.md (document recovery path)

      Independent of stories 1 and 2 — different surface (new tool vs
      reviewer prompt). Can ship in any order.
  - id: "4"
    title: lintSprint validates that every shell `cmd` field is YAML-safe
    status: done
    depends_on: []
    acceptance_criteria:
      checks:
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator e2e --grep "lintSprint flags shell cmd fields with
            unquoted YAML-special characters"
          expect_exit: 0
    orchestrator:
      claimed_by: dev-2026-05-13T4
      claimed_at: 2026-05-13T10:16:59.145Z
      completed_at: 2026-05-13T10:20:29.677Z
      summary: lintSprint now flags shell cmd fields whose raw text fails to round-trip through a
        synthetic YAML mapping, catching unquoted-colon regressions; covered by unit tests and a new
        e2e assertion.
      rework_count: 0
      artefacts:
        - git:4f36750a0ca6ba45071d88b50276ed1c7d8ad385
        - plugins/sprint-orchestrator/packages/mcp-server/src/tools/lint-sprint.ts
        - plugins/sprint-orchestrator/packages/mcp-server/__tests__/lint-sprint.test.ts
        - plugins/sprint-orchestrator/scripts/e2e.ts
    notes: |
      PROBLEM: triage-1 story 2 had cmd:
        cmd: pnpm ... --grep "branch-per-story: dependent ..."
      The unquoted apostrophe + colon caused YAML.parse to fail with
      "Nested mappings are not allowed in compact mappings" — and
      getReadyStories crashed mid-run. Hand-fixed by quoting.

      lintSprint (existing MCP tool from bugfix-2 story #7) already
      checks shell ACs are dry-runnable. It should also check the
      cmd's STRING REPRESENTATION is YAML-safe by re-parsing it.

      BEHAVIOUR (lint-sprint.ts):
        - For every story.acceptance_criteria.checks[*] of type shell:
          - Take the raw text of the cmd field as it would appear in
            YAML (after the dump round-trip).
          - Build a synthetic YAML doc:  `cmd: <value>\n`
          - Parse it. If parse fails OR the parsed value !== original,
            flag the story:
              issue: "shell cmd contains YAML-ambiguous characters
                (likely unquoted ':' or quote chars). Quote the cmd
                value: cmd: \"<original>\"."
              location: stories[<id>].acceptance_criteria.checks[<i>].cmd
        - Existing dry-run check stays. Two checks per shell AC now.

      INTEGRATION AC: new e2e assertion writes a fixture sprint with a
      story whose cmd is `pnpm e2e --grep "x: y"` (unquoted), runs
      lintSprint via the MCP tool, asserts the issue list contains a
      YAML-safety entry pointing at that cmd's location.

      FILES TO TOUCH:
        - plugins/sprint-orchestrator/packages/mcp-server/src/tools/lint-sprint.ts
        - plugins/sprint-orchestrator/packages/mcp-server/__tests__/lint-sprint.test.ts
        - plugins/sprint-orchestrator/scripts/e2e.ts (mini-run + grep tag)

      Smallest story in the sprint. No dependency on 1-3.
