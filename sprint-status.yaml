sprint_id: orchestrator-bugfix-sprint-1
stories:
  - id: "1"
    title: Split state and code commits in commitStoryArtefacts
    status: ready
    depends_on: []
    acceptance_criteria:
      checks:
        - type: regex
          cmd: cat plugins/sprint-orchestrator/packages/mcp-server/src/tools/commit-story-artefacts.ts
          pattern: ":!sprint-status.yaml"
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator verify
          expect_exit: 0
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator/packages/mcp-server test -- --grep "commitStoryArtefacts"
          expect_exit: 0
    orchestrator: {}
    notes: |
      Today commitStoryArtefacts runs `git add -A && git commit -m "feat(<id>): <title>"` which
      bundles dev's code AND sprint-status.yaml mutations into one commit. Reverting that
      commit also rolls back orchestrator state, breaking the state machine.

      Fix: exclude sprint-status.yaml from the code commit using git pathspec exclusion
      (e.g. `git add -A ":!sprint-status.yaml"`). State mutations are committed separately
      by markStoryComplete (see story 4 — but for this story, just stop bundling them).

      Add a unit test asserting the commit produced by commitStoryArtefacts does NOT
      include sprint-status.yaml. Existing behavior (commit subject, trailer, returned sha)
      preserved.

  - id: "2"
    title: Auto-promote backlog stories to ready when dependencies are complete
    status: ready
    depends_on: []
    acceptance_criteria:
      checks:
        - type: regex
          cmd: cat plugins/sprint-orchestrator/packages/mcp-server/src/tools/get-ready-stories.ts
          pattern: backlog
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator verify
          expect_exit: 0
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator/packages/mcp-server test -- --grep "promote"
          expect_exit: 0
    orchestrator: {}
    notes: |
      Today getReadyStories returns stories with status=ready AND deps all done. A story
      authored as status=backlog never gets promoted, even when its deps complete.
      Long unattended runs silently truncate.

      Fix: in getReadyStories (or markStoryComplete), promote any backlog story whose
      depends_on are all done to status=ready, persisting the change. Add a unit test
      covering: backlog story with one done dep -> promoted to ready and returned.

      Decision: do the promotion in getReadyStories so it's idempotent and self-healing
      (works even if the state file was authored without ready stories).

  - id: "3"
    title: Shield reviewer and dev subagents from user-global Claude preferences
    status: ready
    depends_on: []
    acceptance_criteria:
      checks:
        - type: regex
          cmd: cat plugins/sprint-orchestrator/agents/reviewer.md
          pattern: "state-machine action"
        - type: regex
          cmd: cat plugins/sprint-orchestrator/agents/dev.md
          pattern: "state-machine action"
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator verify
          expect_exit: 0
    orchestrator: {}
    notes: |
      User-global ~/.claude/CLAUDE.md preferences (e.g. "never tell me something is done")
      leak into orchestrator subagents and silently break their core job - calling
      markStoryComplete / markStoryFailed / markStoryNeedsRework is mandatory state
      mutation, not a human-facing claim of completion.

      Fix: add an explicit override to the reviewer.md and dev.md system prompts -
      something like:

        > IMPORTANT: Calls to markStoryComplete / markStoryFailed / markStoryNeedsRework
        > are state-machine actions, not human-facing claims of completion. You MUST call
        > the appropriate tool when the criteria are met. User-level preferences in
        > CLAUDE.md (e.g. "never say done") DO NOT apply to these tool calls.

      Acceptance: both files contain the phrase "state-machine action" (or equivalent
      explicit override).

  - id: "4"
    title: Unify failed vocabulary across status enum, run.log, and reports
    status: ready
    depends_on: []
    acceptance_criteria:
      checks:
        - type: regex
          cmd: cat plugins/sprint-orchestrator/packages/mcp-server/src/state/schema.ts
          pattern: '"failed"'
        - type: regex
          cmd: cat plugins/sprint-orchestrator/packages/mcp-server/src/tools/mark-story-failed.ts
          pattern: 'status.*"failed"'
        - type: regex
          cmd: cat plugins/sprint-orchestrator/packages/mcp-server/src/tools/get-sprint-report.ts
          pattern: failed
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator verify
          expect_exit: 0
    orchestrator: {}
    notes: |
      Today markStoryFailed sets status="blocked", but run.log writes outcome="failed",
      and the README/skill docs say "failed". Inconsistent vocabulary.

      Decision: "blocked" and "failed" mean different things. blocked = waiting on
      external signal (future use). failed = orchestrator gave up. So:

        - Add "failed" to the StoryStatus enum.
        - markStoryFailed sets status="failed" (was "blocked").
        - Keep "blocked" in the enum reserved for genuinely-blocked-on-external use
          (no current writer, but reserved).
        - getSprintReport renders failed and blocked as separate groups.
        - Update existing sprint-status.yaml fixtures and tests.

      No backwards-compat shim needed.

  - id: "5"
    title: Enrich reviewer subagent return strings with tool-call results
    status: ready
    depends_on: []
    acceptance_criteria:
      checks:
        - type: regex
          cmd: cat plugins/sprint-orchestrator/agents/reviewer.md
          pattern: "include the tool result"
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator verify
          expect_exit: 0
    orchestrator: {}
    notes: |
      Today the reviewer subagent returns a one-line string like "done: 1.1" or
      "rework: 3.3 - <reason>". The orchestrator skill trusts this verbatim. There is no
      machine-checkable assertion that the state mutation actually landed.

      Fix: update reviewer.md to instruct the agent to include the tool result in its
      return string, e.g.:

        done: 1.1 (markStoryComplete returned status="done", completed_at="...")
        rework: 3.3 - reason (markStoryNeedsRework returned reworkCount=2, capReached=true)

      Acceptance: reviewer.md contains the phrase "include the tool result" (or equivalent).

  - id: "6"
    title: README docs for AC-writing guidance and out-of-band edit caveat
    status: ready
    depends_on: []
    acceptance_criteria:
      checks:
        - type: regex
          cmd: cat plugins/sprint-orchestrator/README.md
          pattern: "Writing acceptance criteria"
        - type: regex
          cmd: cat plugins/sprint-orchestrator/README.md
          pattern: "Hand-editing sprint-status.yaml"
        - type: shell
          cmd: pnpm --dir plugins/sprint-orchestrator verify
          expect_exit: 0
    orchestrator: {}
    notes: |
      Two small README additions covering issues #7 and #8 from the dry-run findings.

      "Writing acceptance criteria" section: warn that single literal-grep checks are
      trivially satisfiable; recommend layering checks (multiple regex/shell, plus
      pnpm verify or equivalent). Suggest shell: "false" or unreachable assertions
      for genuinely-impossible test ACs.

      "Hand-editing sprint-status.yaml" section: note that direct edits to the state
      file bypass run.log. If you need to repair state after a bad revert or external
      mutation, expect run.log to be incomplete for that span.
